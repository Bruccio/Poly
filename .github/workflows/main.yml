name: 🐋 Whale Tracker v3

on:
  # 09:00 e 21:00 ora italiana (UTC+2 estate)
  # 07:00 e 19:00 UTC in estate | 08:00 e 20:00 UTC in inverno
  schedule:
    - cron: "0 7,19 * * *"

  # Lancio manuale dal tab "Actions" — nessun parametro richiesto
  workflow_dispatch:

permissions:
  contents: write

jobs:
  whale-briefing:
    name: Analisi whale e invio report
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
      ONLY_NOTIFY_ON_COPY: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Testa funzioni critiche
        run: python -m pytest tests/ -q --tb=short
        continue-on-error: true

      - name: Esegui Whale Tracker
        run: python whale_tracker.py

      - name: Salva stato whale nel repo
        if: always()
        run: |
          git config user.name "Whale Tracker Bot"
          git config user.email "whale-bot@github-actions.local"
          git add whale_state.json index.html || true
          git diff --cached --quiet || git commit -m "chore: aggiorna whale_state run #$(date +%Y%m%d-%H%M) [skip ci]"
          git push || echo "Push fallito (nessuna modifica?)"

      - name: Salva log come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whale-log-${{ github.run_id }}
          path: whale_log.jsonl
          retention-days: 30
          if-no-files-found: ignore

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐋 Polymarket Whale Tracker v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:    #0a0e1a;
      --bg-secondary:  #141b2f;
      --bg-tertiary:   #1a2847;
      --accent-green:  #00ff9f;
      --accent-cyan:   #00f0ff;
      --accent-yellow: #fcee0c;
      --accent-red:    #ff3c5a;
      --accent-blue:   #4a9eff;
      --text-primary:  #e8f1ff;
      --text-secondary:#a0b8d8;
      --border-light:  #2a3f5f;
      --border-dark:   #1a2f4f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ───────────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(90deg, rgba(10,14,26,0.95) 0%, rgba(20,27,47,0.95) 100%);
      border-bottom: 2px solid var(--accent-cyan);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,240,255,0.15);
    }

    header h1 {
      font-family: 'Fira Code', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent-green) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 6px;
      background: rgba(0, 255, 159, 0.2);
      border: 1.5px solid var(--accent-green);
      color: var(--accent-green);
      text-shadow: 0 0 8px rgba(0, 255, 159, 0.6);
      animation: pulse-badge 1.5s ease-in-out infinite;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
      animation: blink 1s step-end infinite;
    }

    @keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes blink { 50% { opacity: 0; } }

    #last-update {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* ── MAIN LAYOUT ───────────────────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── STATS ROW ────────────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border: 1.5px solid var(--border-light);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .stat-card:hover {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 24px rgba(0,240,255,0.2);
      transform: translateY(-2px);
    }

    .stat-card .label {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-family: 'Fira Code', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-cyan);
      text-shadow: 0 0 12px rgba(0,240,255,0.4);
    }

    /* ── SECTIONS ────────────────────────────────────────────────────────── */
    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent-cyan);
      background: linear-gradient(90deg, var(--accent-green) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── SIGNAL CARDS (COPY/WATCH) ────────────────────────────────────────── */
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .signal-card {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border: 2px solid var(--border-light);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .signal-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
    }

    .signal-card.copy {
      border-color: var(--accent-green);
      box-shadow: 0 0 20px rgba(0,255,159,0.2);
    }

    .signal-card.copy:hover {
      box-shadow: 0 0 30px rgba(0,255,159,0.4);
      transform: translateY(-4px);
    }

    .signal-card.watch {
      border-color: var(--accent-yellow);
      box-shadow: 0 0 20px rgba(252,238,12,0.15);
    }

    .signal-card.watch:hover {
      box-shadow: 0 0 30px rgba(252,238,12,0.3);
      transform: translateY(-4px);
    }

    .signal-card.resolved-ok {
      border-color: var(--accent-green);
      opacity: 0.8;
    }

    .signal-card.resolved-ko {
      border-color: var(--accent-red);
      opacity: 0.7;
    }

    .signal-badge {
      display: inline-block;
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .badge-copy {
      background: rgba(0,255,159,0.25);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }

    .badge-watch {
      background: rgba(252,238,12,0.25);
      color: var(--accent-yellow);
      border: 1px solid var(--accent-yellow);
    }

    .badge-ok {
      background: rgba(0,255,159,0.25);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }

    .badge-ko {
      background: rgba(255,60,90,0.25);
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
    }

    .signal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .signal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-dark);
    }

    .signal-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .yes-tag {
      color: var(--accent-green);
      font-weight: 600;
    }

    .no-tag {
      color: var(--accent-red);
      font-weight: 600;
    }

    /* ── LEADERBOARD ───────────────────────────────────────────────────────── */
    .lb-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1.5px solid var(--border-light);
      background: var(--bg-secondary);
    }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 600px;
    }

    .lb-table th {
      font-family: 'Fira Code', monospace;
      text-align: left;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 16px;
      border-bottom: 2px solid var(--accent-cyan);
      background: rgba(0,240,255,0.05);
    }

    .lb-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-dark);
      vertical-align: middle;
    }

    .lb-table tr:hover td {
      background: rgba(0,240,255,0.05);
    }

    .rank {
      font-family: 'Fira Code', monospace;
      color: var(--accent-cyan);
      font-weight: 700;
      width: 40px;
    }

    .whale-name {
      font-weight: 600;
      color: var(--accent-green);
    }

    .profit {
      font-family: 'Fira Code', monospace;
      color: var(--accent-green);
      font-weight: 700;
    }

    .trust-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .trust-bar {
      height: 6px;
      border-radius: 4px;
      background: var(--border-dark);
      flex: 1;
      max-width: 100px;
      overflow: hidden;
    }

    .trust-bar-fill {
      height: 100%;
      border-radius: 4px;
      box-shadow: 0 0 8px currentColor;
    }

    /* ── LOADING & EMPTY STATES ────────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 24px;
    }

    .spinner-text {
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .spinner-bar {
      width: 280px;
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .spinner-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
      box-shadow: 0 0 12px rgba(0,240,255,0.5);
      animation: load 1.2s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .empty {
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
      font-style: italic;
    }

    /* ── FOOTER ────────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-light);
      margin-top: 40px;
    }

    /* ── RESPONSIVE ────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      header h1 {
        font-size: 1.3rem;
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .signal-grid {
        grid-template-columns: 1fr;
      }

      main {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner-text">&gt; Connessione ai dati whale...</div>
  <div class="spinner-bar"><div class="spinner-fill"></div></div>
</div>

<div id="app" style="display:none">

<header>
  <h1>🐋 WHALE INTELLIGENCE TERMINAL <small style="font-size:0.6em;color:var(--text-secondary);">v3</small></h1>
  <div class="header-status">
    <div class="live-badge"><span class="live-dot"></span> 4x DAILY</div>
    <div id="last-update" style="font-size:0.85rem;">LAST_RUN: —</div>
  </div>
</header>

<main>
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Run Totali</div>
      <div class="value" id="stat-runs">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Whale Tracciati</div>
      <div class="value" id="stat-whales">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Segnali COPY</div>
      <div class="value" id="stat-copies">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Accuracy</div>
      <div class="value" id="stat-accuracy">—</div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="section">
    <h2>🏆 Top Whale Leaderboard</h2>
    <div class="lb-wrap" id="leaderboard-container">
      <div class="empty">// leaderboard vuota — primo run in attesa</div>
    </div>
  </div>

  <!-- SEGNALI COPY/WATCH -->
  <div class="section">
    <h2>🎯 Segnali Attivi & Risolti</h2>
    <div class="signal-grid" id="watched-container">
      <div class="empty">// nessun segnale ancora — primo run in attesa</div>
    </div>
  </div>

</main>

</div>

<script>
// ── UTILITIES ────────────────────────────────────────────────────────────────
function fmt$(n) {
  if (!n && n !== 0) return '—';
  n = parseFloat(n);
  if (n >= 1e6) return '+$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '+$' + Math.round(n).toLocaleString('it-IT');
  return '+$' + n.toFixed(0);
}

function fmtK(n) {
  if (!n && n !== 0) return '—';
  n = parseFloat(n);
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + Math.round(n/1000) + 'k';
  return '$' + n.toFixed(0);
}

function trustColor(t) {
  if (t >= 80) return '#00ff9f';
  if (t >= 60) return '#fcee0c';
  if (t >= 40) return '#ff9900';
  return '#ff3c5a';
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('it-IT', {day:'2-digit',month:'short'});
  } catch { return '—'; }
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(state) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';

  const stats = state.algo_stats || {};
  const lastUpd = state.last_run
    ? new Date(state.last_run).toLocaleString('it-IT')
    : (stats.last_updated ? new Date(stats.last_updated).toLocaleString('it-IT') : '—');
  document.getElementById('last-update').textContent = 'LAST_RUN: ' + lastUpd;

  document.getElementById('stat-runs').textContent = state.run_count ?? '—';
  document.getElementById('stat-whales').textContent = Object.keys(state.leaderboard||{}).length || '—';
  document.getElementById('stat-copies').textContent = stats.total_copy_signals ?? '—';

  const acc = stats.accuracy_pct;
  const accEl = document.getElementById('stat-accuracy');
  if (acc != null) {
    accEl.textContent = acc + '%';
    accEl.style.color = acc >= 60 ? '#00ff9f' : acc >= 40 ? '#fcee0c' : '#ff3c5a';
  } else {
    accEl.textContent = 'N/D';
    accEl.style.color = '#a0b8d8';
  }

  // ── Leaderboard
  const lb = state.leaderboard || {};
  const lbArr = Object.entries(lb)
    .map(([addr, d]) => ({addr, ...d}))
    .sort((a,b) => (b.total_profit_usd||0) - (a.total_profit_usd||0))
    .slice(0, 20);

  const lbC = document.getElementById('leaderboard-container');
  if (!lbArr.length) {
    lbC.innerHTML = '<div class="empty">// leaderboard vuota — primo run in attesa</div>';
  } else {
    let rows = '';
    lbArr.forEach((w, i) => {
      const t = w.trust_score ?? 40;
      const tc = trustColor(t);
      rows += `<tr>
        <td class="rank">#${i+1}</td>
        <td class="whale-name">${esc(w.username || w.addr?.slice(0,12))}</td>
        <td class="profit">${fmt$(w.total_profit_usd)}</td>
        <td>
          <div class="trust-bar-wrap">
            <div class="trust-bar">
              <div class="trust-bar-fill" style="width:${t}%;background:${tc};"></div>
            </div>
            <span style="color:${tc};font-family:'Fira Code',monospace;font-weight:600;">${t}</span>
          </div>
        </td>
        <td style="color:var(--text-secondary);font-family:'Fira Code',monospace;font-size:0.8rem;">${fmtDate(w.last_seen)}</td>
      </tr>`;
    });
    lbC.innerHTML = `<table class="lb-table">
      <thead><tr>
        <th>#</th><th>Whale</th><th>Profitto</th><th>Trust</th><th>Visto</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  // ── Watched markets
  const watched = Object.values(state.watched_markets || {})
    .sort((a,b) => (b.date_flagged||'').localeCompare(a.date_flagged||''));
  const wC = document.getElementById('watched-container');
  if (!watched.length) {
    wC.innerHTML = '<div class="empty">// nessun segnale ancora — primo run in attesa</div>';
  } else {
    wC.innerHTML = watched.map(m => {
      let cls, badgeCls, badgeTxt;
      if (m.resolved) {
        cls = m.correct ? 'resolved-ok' : 'resolved-ko';
        badgeCls = m.correct ? 'badge-ok' : 'badge-ko';
        badgeTxt = m.correct ? '✓ RISOLTO OK' : '✗ RISOLTO FAIL';
      } else {
        const v = m.our_verdict || 'COPY';
        cls = v === 'COPY' ? 'copy' : 'watch';
        badgeCls = v === 'COPY' ? 'badge-copy' : 'badge-watch';
        badgeTxt = v === 'COPY' ? '▶ COPY' : '◉ WATCH';
      }
      const pr = m.entry_price ? (parseFloat(m.entry_price)*100).toFixed(0)+'%' : '—';
      const side = (m.side || 'YES').toUpperCase();
      const sideClass = side === 'YES' || side.includes('YES') ? 'yes-tag' : 'no-tag';
      return `<div class="signal-card ${cls}">
        <span class="signal-badge ${badgeCls}">${badgeTxt}</span>
        <div class="signal-title">${esc(m.question||'???')}</div>
        <div class="signal-meta">
          <span class="${sideClass}">${side} @ ${pr}</span>
          <span>${m.date_flagged ? new Date(m.date_flagged).toLocaleDateString('it-IT') : '—'}</span>
          ${m.resolution ? `<span>EXIT: ${esc(m.resolution)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }
}

// ── LOAD ──────────────────────────────────────────────────────────────
const STATE_URL = 'whale_state.json';
const RAW_URL = 'https://raw.githubusercontent.com/bruccio/Poly/main/whale_state.json';

async function loadState() {
  for (const url of [STATE_URL + '?t=' + Date.now(), RAW_URL + '?t=' + Date.now()]) {
    try {
      const res = await fetch(url);
      if (res.ok) return await res.json();
    } catch {}
  }
  document.getElementById('loading').innerHTML =
    '<div style="color:#ff3c5a;font-family:monospace;font-size:1rem;text-align:center;">' +
    '&gt; ERROR: whale_state.json non trovato<br>' +
    '<span style="color:#a0b8d8;font-size:0.9rem;">Il bot deve eseguire almeno un run prima.</span></div>';
  return null;
}

loadState().then(d => { if (d) setTimeout(() => render(d), 600); });
</script>

</body>
</html>
